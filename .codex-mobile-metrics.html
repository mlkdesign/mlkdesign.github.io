<!doctype html>
<meta charset="utf-8">
<style>
  html, body, iframe { margin: 0; width: 100%; height: 100%; border: 0; }
</style>
<iframe id="page" src="index.html"></iframe>
<pre id="result"></pre>
<script>
  const frame = document.querySelector('#page');
  const output = document.querySelector('#result');

  const measure = async () => {
    const win = frame.contentWindow;
    const doc = frame.contentDocument;
    const about = doc.querySelector('.about');
    if (!about) {
      setTimeout(measure, 50);
      return;
    }
    await new Promise((resolve) => setTimeout(resolve, 1000));
    const sticky = doc.querySelector('.about-sticky');
    const header = doc.querySelector('.site-header');
    const firstService = doc.querySelector('.service');
    const headerBottom = header.getBoundingClientRect().bottom;
    const firstServiceTop = firstService.getBoundingClientRect().top - sticky.getBoundingClientRect().top;
    const pinShift = Math.max(0, Math.round(firstServiceTop - headerBottom - 30));
    const aboutTop = about.offsetTop;
    const aboutHeight = about.offsetHeight;
    const stickyHeight = sticky.offsetHeight;
    const bodyHeights = Array.from(doc.querySelectorAll('.service-body')).map((body) => body.scrollHeight);
    const viewportHeight = win.innerHeight;
    const pinStart = aboutTop + pinShift;
    const progressEnd = aboutTop + aboutHeight - viewportHeight;
    const actualStickyEnd = aboutTop + aboutHeight - stickyHeight + pinShift;
    const oldSamples = [];

    for (const scroll of [pinStart, actualStickyEnd - 1, actualStickyEnd + 1, progressEnd]) {
      win.scrollTo(0, scroll);
      await new Promise((resolve) => win.requestAnimationFrame(() => win.requestAnimationFrame(resolve)));
      oldSamples.push({
        scroll: Math.round(scroll),
        stickyTop: Math.round(sticky.getBoundingClientRect().top),
        progress: Number(((scroll - pinStart) / (progressEnd - pinStart)).toFixed(3)),
      });
    }

    win.scrollTo(0, 0);
    const totalBodyHeight = bodyHeights.reduce((sum, height) => sum + height, 0);
    const collapseDistance = Math.ceil(Math.max(totalBodyHeight, viewportHeight * 1.5));
    const buffer = 60;
    const fixedAboutHeight = Math.ceil(stickyHeight + collapseDistance + buffer);
    about.style.setProperty('--about-mobile-height', `${fixedAboutHeight}px`);
    sticky.style.top = `${-pinShift}px`;
    await new Promise((resolve) => win.requestAnimationFrame(() => win.requestAnimationFrame(resolve)));

    const fixedProgressEnd = pinStart + collapseDistance;
    const fixedRelease = fixedProgressEnd + buffer;
    const fixedSamples = [];
    for (const scroll of [pinStart, fixedProgressEnd, fixedRelease - 1, fixedRelease + 1]) {
      win.scrollTo(0, scroll);
      await new Promise((resolve) => win.requestAnimationFrame(() => win.requestAnimationFrame(resolve)));
      fixedSamples.push({
        scroll: Math.round(scroll),
        stickyTop: Math.round(sticky.getBoundingClientRect().top),
        progress: Number(((scroll - pinStart) / collapseDistance).toFixed(3)),
      });
    }

    const metrics = {
      viewport: { width: win.innerWidth, height: viewportHeight },
      aboutTop,
      aboutHeight,
      stickyHeight,
      stickyTopRule: getComputedStyle(sticky).top,
      bodyHeights,
      totalBodyHeight,
      stickyExcess: stickyHeight - viewportHeight,
      pinShift,
      pinStart,
      actualStickyEnd,
      progressEnd,
      progressAtStickyEnd: Number(((actualStickyEnd - pinStart) / (progressEnd - pinStart)).toFixed(3)),
      earlyBy: progressEnd - actualStickyEnd,
      oldSamples,
      fixed: {
        aboutHeight: about.offsetHeight,
        collapseDistance,
        progressEnd: fixedProgressEnd,
        release: fixedRelease,
        holdBuffer: buffer,
        samples: fixedSamples,
      },
    };

    frame.remove();
    output.textContent = JSON.stringify(metrics, null, 2);
    document.title = 'metrics-ready';
  };

  measure();
</script>
